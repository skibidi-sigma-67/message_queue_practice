name: CI Pipeline

on:
  pull_request:
    branches: ["main"]

jobs:
  codestyle:
    name: 🎨 Codestyle Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cmake ninja-build jq

      - name: Generate compilation database
        run: cmake -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy and report
        run: |
          FILES=$(find src -type f \( -name "*.cpp" -o -name "*.hpp" \))

          echo "### 🎨 Codestyle Report (clang-tidy)" >> $GITHUB_STEP_SUMMARY

          if [ -z "$FILES" ]; then
            echo "✅ **No source files found to check.**" >> $GITHUB_STEP_SUMMARY
          else
            if clang-tidy -p build --warnings-as-errors=* $FILES > tidy_log.txt 2>&1; then
              echo "✅ **Perfect!** Code follows the style guidelines. No issues found." >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ **Formatting issues found (Non-blocking):**" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
              cat tidy_log.txt >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  build_and_test:
    name: 🛠️ Build & Test - ${{ matrix.config.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "gcc", cc: "gcc", cxx: "g++", flags: "" }
          - {
              name: "gcc (san)",
              cc: "gcc",
              cxx: "g++",
              flags: "-fsanitize=address,undefined",
            }
          - { name: "clang", cc: "clang", cxx: "clang++", flags: "" }
          - {
              name: "clang (san)",
              cc: "clang",
              cxx: "clang++",
              flags: "-fsanitize=address,undefined",
            }

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build jq

      - name: Attempt Build With Tests
        id: build_tests
        env:
          CC: ${{ matrix.config.cc }}
          CXX: ${{ matrix.config.cxx }}
          CXXFLAGS: ${{ matrix.config.flags }}
        run: |
          if cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON && cmake --build build; then
            echo "HAS_TESTS=true" >> $GITHUB_ENV
          else
            echo "HAS_TESTS=false" >> $GITHUB_ENV
            echo "⚠️ Build with tests failed or tests are missing. Triggering fallback build without tests..." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fallback Build (No Tests)
        if: env.HAS_TESTS == 'false'
        env:
          CC: ${{ matrix.config.cc }}
          CXX: ${{ matrix.config.cxx }}
          CXXFLAGS: ${{ matrix.config.flags }}
        run: |
          cmake -B build_fallback -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build_fallback

      - name: List Compiled Files
        run: |
          DIR="build"
          if [ "$HAS_TESTS" == "false" ]; then DIR="build_fallback"; fi

          echo "### 📦 List of Compiled Files (${{ matrix.config.name }})" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY

          if [ -f $DIR/compile_commands.json ]; then
            jq -r '.[].file' $DIR/compile_commands.json | awk -F'${{ github.workspace }}/' '{print "- " $2}' >> $GITHUB_STEP_SUMMARY
          else
            echo "No files compiled or compile_commands.json missing." >> $GITHUB_STEP_SUMMARY
          fi

          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Run Tests
        if: env.HAS_TESTS == 'true'
        run: |
          echo "### 🧪 Test Results (${{ matrix.config.name }})" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY

          if ctest --test-dir build --output-on-failure --no-tests=ignore -j $(nproc) > test_log.txt 2>&1; then
            cat test_log.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            cat test_log.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  pr_comment:
    name: 📝 Generate PR Report
    runs-on: ubuntu-latest
    needs: [codestyle, build_and_test]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const codestyleStatus = '${{ needs.codestyle.result }}';
            const buildStatus = '${{ needs.build_and_test.result }}';

            const emojiCode = codestyleStatus === 'success' ? '✅' : (codestyleStatus === 'skipped' ? '⏭️' : '⚠️');
            const emojiBuild = buildStatus === 'success' ? '✅' : '❌';

            const body = `## 🚀 Overdrive CI Pipeline Report

            | Check Area | Status |
            |---|---|
            | **🎨 Codestyle (clang-tidy)** | ${emojiCode} ${codestyleStatus.toUpperCase()} |
            | **🛠️ Build & Test (Compiler Matrix)** | ${emojiBuild} ${buildStatus.toUpperCase()} |

            **[Full logs, file lists, and test results are available in the "Checks" -> "Summary" tab](${context.payload.pull_request.html_url}/checks)**
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
